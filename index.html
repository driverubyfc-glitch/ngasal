<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Rekber - Fluid Interface</title>
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-blue-light: #40a7e3;
            --tg-bg: #f5f6f7;
            --tg-text: #222222;
            --tg-hint: #999999;
            --bubble-me: #effdde;
            --bubble-bot: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background: var(--tg-bg); color: var(--tg-text);
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .phone-frame {
            width: 100%; max-width: 400px; height: 100vh;
            background: #ffffff; display: flex; flex-direction: column;
            position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* HEADER */
        .app-bar {
            background: var(--tg-blue); color: white; padding: 12px 16px;
            display: flex; align-items: center; gap: 15px;
        }
        .avatar {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: var(--tg-blue);
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px 15px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: cover;
        }

        .bubble {
            max-width: 85%; padding: 12px 16px; border-radius: 15px;
            margin-bottom: 12px; font-size: 0.95rem; line-height: 1.4;
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .bot { background: var(--bubble-bot); border-bottom-left-radius: 2px; }
        
        /* DYNAMIC INPUTS */
        .input-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 10px;
        }
        .field-box {
            background: rgba(255,255,255,0.9); border: 1px solid #ddd;
            border-radius: 8px; padding: 8px;
        }
        .field-box label { font-size: 0.7rem; color: var(--tg-blue); display: block; font-weight: bold; }
        .field-box input, .field-box select {
            width: 100%; border: none; background: transparent; outline: none;
            font-size: 0.9rem; padding: 4px 0;
        }

        /* OUTPUT BOX */
        .result-bubble {
            background: #ffffff; border-radius: 12px; padding: 15px;
            font-family: 'Consolas', monospace; font-size: 0.8rem;
            white-space: pre-wrap; border-left: 4px solid var(--tg-blue);
            margin-top: 15px;
        }

        /* BOTTOM NAV */
        .tabs {
            display: flex; border-top: 1px solid #eee; background: #fff;
        }
        .tab-btn {
            flex: 1; padding: 15px; text-align: center; cursor: pointer;
            color: var(--tg-hint); font-size: 0.8rem; font-weight: bold;
        }
        .tab-btn.active { color: var(--tg-blue); border-top: 2px solid var(--tg-blue); }

        .btn-send {
            background: var(--tg-blue); color: white; border: none;
            width: 100%; padding: 15px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-bar">
        <div class="avatar">R</div>
        <div>
            <div style="font-weight: bold;">Rose System Bot</div>
            <div style="font-size: 0.75rem; opacity: 0.8;">online</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="bubble bot">
            Halo! Pilih layanan untuk membuat format transaksi secara otomatis.
        </div>

        <!-- INPUTS -->
        <div id="input-section" class="input-grid">
            <!-- Injected by JS -->
        </div>

        <div class="input-grid" style="grid-template-columns: 1fr; margin-top: 10px;">
            <div class="field-box">
                <label>Pilihan Tambahan</label>
                <select id="g_qris" onchange="updateFormat()">
                    <option value="no">Tanpa QRIS</option>
                    <option value="yes only dana">QRIS (Dana Only)</option>
                </select>
                <select id="g_subs" onchange="updateFormat()" style="margin-top: 5px;">
                    <option value="sudah">Sudah Subs @roserekber</option>
                    <option value="belum">Belum Subs @roserekber</option>
                </select>
            </div>
        </div>

        <!-- OUTPUT -->
        <div id="output" class="result-bubble">Isi data di atas...</div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="switchTab('rekber', this)">REKBER</div>
        <div class="tab-btn" onclick="switchTab('jaspin', this)">JASPIN</div>
        <div class="tab-btn" onclick="switchTab('convert', this)">CONVERT</div>
    </div>
    <button class="btn-send" onclick="copyResult()">SALIN FORMAT & KIRIM</button>
</div>

<script>
    let activeTab = 'rekber';

    function formatTitik(n) {
        if (!n) return "0";
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function handleInputNominal(el) {
        let val = el.value.replace(/\D/g, '');
        el.dataset.raw = val;
        el.value = val ? formatTitik(val) : '';
        updateFormat();
    }

    function switchTab(type, btn) {
        activeTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFields();
    }

    function renderFields() {
        const container = document.getElementById('input-section');
        if(activeTab === 'rekber') {
            container.innerHTML = `
                <div class="field-box"><label>Seller</label><input type="text" id="r_sell" oninput="updateFormat()"></div>
                <div class="field-box"><label>Buyer</label><input type="text" id="r_buy" oninput="updateFormat()"></div>
                <div class="field-box"><label>Item</label><input type="text" id="r_item" oninput="updateFormat()"></div>
                <div class="field-box"><label>Nominal</label><input type="text" id="r_nom" oninput="handleInputNominal(this)"></div>
                <div class="field-box"><label>Via Sell</label><input type="text" id="r_vp" oninput="updateFormat()"></div>
                <div class="field-box"><label>Via Buy</label><input type="text" id="r_vb" oninput="updateFormat()"></div>
            `;
        } else if(activeTab === 'jaspin') {
            container.innerHTML = `
                <div class="field-box"><label>User</label><input type="text" id="j_user" oninput="updateFormat()"></div>
                <div class="field-box"><label>Nominal</label><input type="text" id="j_nom" oninput="handleInputNominal(this)"></div>
                <div class="field-box" style="grid-column: span 2;"><label>Nomor + A.N</label><input type="text" id="j_nan" oninput="updateFormat()"></div>
            `;
        } else {
            container.innerHTML = `
                <div class="field-box"><label>Tipe</label><select id="c_tipe" onchange="updateFormat()"><option value="prem">Prem</option><option value="non">Non</option></select></div>
                <div class="field-box"><label>Nominal</label><input type="text" id="c_nom" oninput="handleInputNominal(this)"></div>
                <div class="field-box"><label>Dari</label><input type="text" id="c_dari" oninput="updateFormat()"></div>
                <div class="field-box"><label>Ke</label><input type="text" id="c_ke" oninput="updateFormat()"></div>
            `;
        }
        updateFormat();
    }

    function updateFormat() {
        let output = "";
        const qris = document.getElementById('g_qris').value;
        const subs = document.getElementById('g_subs').value;

        if(activeTab === 'rekber') {
            let nom = parseInt(document.getElementById('r_nom')?.dataset.raw) || 0;
            let vp = (document.getElementById('r_vp')?.value || "").toLowerCase().trim();
            let vb = (document.getElementById('r_vb')?.value || "").toLowerCase().trim();
            
            // Logika Fee Rekber @cellrekber Original
            let feeRek = 0; let isP = true;
            if(nom < 10000) feeRek = 0;
            else if(nom < 20000) feeRek = 30;
            else if(nom < 60000) feeRek = 100;
            else if(nom < 400000) feeRek = 200;
            else if(nom < 1000000) { feeRek = 2000; isP = false; }
            else { feeRek = 5000; isP = false; }

            let total = feeRek;
            let fFinal = (total < 1000 && isP) ? total + "p" : formatTitik(total);

            output = `🪷 𓏸  FORMAT REKBER E WALLET ☏\n\nㅤ𐀶. . username penjual :: @${document.getElementById('r_sell')?.value || "..."}\nㅤ𐀶. . username pembeli :: @${document.getElementById('r_buy')?.value || "..."}\nㅤ𐀶. . jenis orderan :: ${document.getElementById('r_item')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . fee rekber :: ${fFinal}\nㅤ𐀶. . penjual via :: ${vp}\nㅤ𐀶. . pembeli via :: ${vb}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
        } else if(activeTab === 'jaspin') {
            let nom = parseInt(document.getElementById('j_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT JASPIN ☏\n\nㅤ𐀶. . username :: @${document.getElementById('j_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . fee :: 1.000\nㅤ𐀶. . nomor :: ${document.getElementById('j_nan')?.value || "..."}`;
        } else {
            let nom = parseInt(document.getElementById('c_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT CONVERT ☏\n\nㅤ𐀶. . username :: @${document.getElementById('c_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . via :: ${document.getElementById('c_dari')?.value || "..."} ke ${document.getElementById('c_ke')?.value || "..."}`;
        }
        document.getElementById('output').innerText = output;
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        alert("Format berhasil disalin ke clipboard!");
    }

    renderFields();
</script>
</body>
</html>
