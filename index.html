<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>iOS x Telegram - 3 Pages</title>
  <style>
    :root{
      --bg: #f4f6fa;
      --card: rgba(255,255,255,.86);
      --card2: rgba(255,255,255,.72);
      --text: #0f172a;
      --muted: rgba(15,23,42,.55);
      --line: rgba(15,23,42,.10);
      --shadow: 0 18px 60px rgba(2,6,23,.12);
      --tg: #229ED9;
      --tg2: #1b86b6;
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --blur: blur(18px);
      --device: 430px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "SF Pro Display","SF Pro Text", Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(34,158,217,.18), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, rgba(34,158,217,.10), transparent 55%),
                  linear-gradient(180deg, #eef3fb, var(--bg));
      display:flex;
      justify-content:center;
      padding: 18px 12px 36px;
      color: var(--text);
    }

    .phone{
      width: min(var(--device), 100%);
      border-radius: 36px;
      overflow:hidden;
      border: 1px solid rgba(2,6,23,.10);
      box-shadow: 0 30px 90px rgba(2,6,23,.20);
      background: var(--bg);
      position:relative;
      min-height: 800px;
    }

    .safe{
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(18px, env(safe-area-inset-bottom));
    }

    .top{
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 14px 14px 12px;
      background: rgba(244,246,250,.70);
      backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(15,23,42,.08);
    }
    .topRow{ display:flex; align-items:center; justify-content:space-between; gap: 10px; }
    .brand{ display:flex; align-items:center; gap: 10px; min-width: 140px; }
    .logo{
      width: 40px; height: 40px; border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(255,255,255,.25)),
                  linear-gradient(180deg, rgba(34,158,217,.35), rgba(34,158,217,.15));
      border: 1px solid rgba(34,158,217,.25);
      display:grid; place-items:center; font-weight: 900; color: rgba(15,23,42,.75);
    }
    .brandText b{ display:block; font-size: 14px; }
    .brandText span{ display:block; font-size: 12px; color: var(--muted); }

    .headerActions{ display:flex; align-items:center; gap: 10px; }
    .iconBtn{
      width: 42px; height: 42px; border-radius: 14px; border: 1px solid rgba(15,23,42,.10);
      background: rgba(255,255,255,.72); display:grid; place-items:center; cursor:pointer;
    }

    .page{ display:none; padding: 14px 14px 120px; }
    .page.active{ display:block; }

    .card{
      background: var(--card);
      border: 1px solid rgba(15,23,42,.10);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
    }
    .card.pad{ padding: 14px; }

    .sectionTitle{ display:flex; align-items:flex-end; justify-content:space-between; margin: 10px 2px 10px; }
    .sectionTitle h3{ margin:0; font-size: 16px; }

    .field{
      background: rgba(255,255,255,.74);
      border: 1px solid rgba(15,23,42,.10);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .field label{ display:block; font-size: 11px; color: var(--tg); font-weight: 900; margin-bottom: 4px; text-transform: uppercase; }
    .field input, .field select, .field textarea {
      width:100%; border:0; outline:none; background: transparent; font-size: 14px; color: var(--text);
    }

    .cta{
      margin-top: 12px; width:100%; border:0; border-radius: 18px; padding: 16px;
      font-weight: 900; color: #fff; background: linear-gradient(180deg, var(--tg), var(--tg2));
      box-shadow: 0 20px 40px rgba(34,158,217,.25); cursor:pointer;
    }

    .tabs{
      position:absolute; left:0; right:0; bottom:0;
      padding: 10px 12px max(12px, env(safe-area-inset-bottom));
      background: rgba(244,246,250,.70); backdrop-filter: var(--blur);
      border-top: 1px solid rgba(15,23,42,.08); z-index: 40;
    }
    .tabBar{ display:flex; gap: 8px; background: rgba(15,23,42,.07); border-radius: 20px; padding: 6px; }
    .tab{
      flex:1; border:0; padding: 10px; border-radius: 16px;
      background: transparent; font-weight: 900; color: rgba(15,23,42,.62); cursor:pointer;
    }
    .tab.active{ background: #fff; color: var(--tg); border: 1px solid rgba(15,23,42,.1); }

    /* Result Area */
    #orderOutput {
      width: 100%; min-height: 120px; background: rgba(0,0,0,0.03);
      border-radius: 15px; padding: 10px; font-family: monospace; font-size: 11px;
      border: 1px dashed #ccc; margin-top: 10px; color: #444;
    }
  </style>
</head>

<body>
  <div class="phone safe" id="app">
    <!-- TOP -->
    <div class="top">
      <div class="topRow">
        <div class="brand">
          <div class="logo">CR</div>
          <div class="brandText">
            <b>@cellrekber</b>
            <span>Order Management</span>
          </div>
        </div>
        <div class="headerActions">
          <div class="iconBtn">≡</div>
        </div>
      </div>
    </div>

    <!-- PAGE 1: DASHBOARD -->
    <section class="page active" id="page-1">
      <div class="sectionTitle"><h3>Dashboard</h3></div>
      <div class="card pad">
        <p style="font-size: 13px; color: var(--muted);">Selamat datang di portal order @cellrekber. Silakan pilih menu Order untuk membuat format.</p>
      </div>
    </section>

    <!-- PAGE 2: ORDER CENTER (MODIFIED) -->
    <section class="page" id="page-2">
      <div class="sectionTitle"><h3>Buat Format Order</h3></div>
      <div class="card pad">
        <div class="field">
          <label>Pilih Layanan</label>
          <select id="srv" onchange="initForm()">
            <option value="rekber">Rekber (Rekening Bersama)</option>
            <option value="jaspin">Jaspin (Jasa Posting)</option>
            <option value="convert">Convert Saldo</option>
          </select>
        </div>

        <div id="dynamic-fields"></div>

        <div class="field">
          <label>Pakai Qris?</label>
          <select id="qris" onchange="updateText()">
            <option value="no">Tidak</option>
            <option value="yes only dana">Ya (Hanya Dana)</option>
          </select>
        </div>

        <div class="field">
          <label>Sudah Subs @roserekber?</label>
          <select id="subs" onchange="updateText()">
            <option value="sudah">Sudah</option>
            <option value="belum">Belum</option>
          </select>
        </div>

        <textarea id="orderOutput" readonly placeholder="Format akan muncul di sini..."></textarea>
        <button class="cta" onclick="copyText()">SALIN FORMAT</button>
      </div>
    </section>

    <!-- PAGE 3: PROFILE -->
    <section class="page" id="page-3">
      <div class="sectionTitle"><h3>Profile</h3></div>
      <div class="card pad">
        <b>@User</b>
        <p style="font-size: 12px; color: var(--muted);">Client Access</p>
      </div>
    </section>

    <!-- Bottom Tabs -->
    <div class="tabs">
      <div class="tabBar">
        <button class="tab active" data-page="1">Home</button>
        <button class="tab" data-page="2">Order</button>
        <button class="tab" data-page="3">Profile</button>
      </div>
    </div>
  </div>

  <script>
    // Navigation
    const tabs = document.querySelectorAll('.tab');
    const pages = { 1: document.getElementById('page-1'), 2: document.getElementById('page-2'), 3: document.getElementById('page-3') };

    tabs.forEach(t => t.addEventListener('click', () => {
      const n = t.dataset.page;
      Object.values(pages).forEach(p => p.classList.remove('active'));
      pages[n].classList.add('active');
      tabs.forEach(tab => tab.classList.toggle('active', tab === t));
    }));

    // Form Logic
    function initForm() {
      const s = document.getElementById('srv').value;
      const container = document.getElementById('dynamic-fields');
      if (s === 'rekber') {
        container.innerHTML = `
          <div class="field"><label>Seller</label><input type="text" id="f1" placeholder="@username" oninput="updateText()"></div>
          <div class="field"><label>Buyer</label><input type="text" id="f2" placeholder="@username" oninput="updateText()"></div>
          <div class="field"><label>Item</label><input type="text" id="f3" placeholder="Nama Barang" oninput="updateText()"></div>
          <div class="field"><label>Nominal</label><input type="number" id="f4" placeholder="Harga" oninput="updateText()"></div>
          <div class="field"><label>Via (Seller)</label><input type="text" id="f5" placeholder="Dana/Gopay" oninput="updateText()"></div>
          <div class="field"><label>Via (Buyer)</label><input type="text" id="f6" placeholder="Dana/Gopay" oninput="updateText()"></div>
        `;
      } else if (s === 'jaspin') {
        container.innerHTML = `
          <div class="field"><label>Username</label><input type="text" id="f1" placeholder="@username" oninput="updateText()"></div>
          <div class="field"><label>Nominal</label><input type="number" id="f2" placeholder="Jumlah" oninput="updateText()"></div>
          <div class="field"><label>No + A.N</label><input type="text" id="f3" placeholder="08xxx a.n ..." oninput="updateText()"></div>
        `;
      } else {
        container.innerHTML = `
          <div class="field"><label>Username</label><input type="text" id="f1" placeholder="@username" oninput="updateText()"></div>
          <div class="field"><label>Nominal</label><input type="number" id="f2" placeholder="Jumlah" oninput="updateText()"></div>
          <div class="field"><label>Dari - Ke</label><input type="text" id="f3" placeholder="Dana ke Gopay" oninput="updateText()"></div>
        `;
      }
      updateText();
    }

    function updateText() {
      const s = document.getElementById('srv').value;
      const q = document.getElementById('qris').value;
      const sub = document.getElementById('subs').value;
      let out = "";

      if(s === 'rekber') {
        const nom = parseInt(document.getElementById('f4')?.value || 0);
        let fee = "0";
        if(nom >= 10000 && nom < 20000) fee = "30p";
        else if(nom >= 20000 && nom < 60000) fee = "100p";
        else if(nom >= 60000 && nom < 400000) fee = "200p";
        else if(nom >= 400000 && nom < 1000000) fee = "2.000";
        else if(nom >= 1000000) fee = "5.000";

        out = `🪷 𓏸 FORMAT REKBER\n\nㅤ𐀶 username penjual :: @${document.getElementById('f1')?.value || ""}\nㅤ𐀶 username pembeli :: @${document.getElementById('f2')?.value || ""}\nㅤ𐀶 jenis orderan :: ${document.getElementById('f3')?.value || ""}\nㅤ𐀶 nominal :: ${nom.toLocaleString()}\nㅤ𐀶 fee rekber :: ${fee}\nㅤ𐀶 penjual via :: ${document.getElementById('f5')?.value || ""}\nㅤ𐀶 pembeli via :: ${document.getElementById('f6')?.value || ""}\nㅤ𐀶 pakai qris :: ${q}\nㅤ𐀶 sudah subs @roserekber? :: ${sub}`;
      } else if(s === 'jaspin') {
        out = `🪷 𓏸 FORMAT JASPIN\n\nㅤ𐀶 username :: @${document.getElementById('f1')?.value || ""}\nㅤ𐀶 nominal :: ${(document.getElementById('f2')?.value || 0).toLocaleString()}\nㅤ𐀶 fee :: 1.000\nㅤ𐀶 nomor + a.n :: ${document.getElementById('f3')?.value || ""}\nㅤ𐀶 pakai qris :: ${q}\nㅤ𐀶 sudah subs @roserekber? :: ${sub}`;
      } else {
        out = `🪷 𓏸 FORMAT CONVERT\n\nㅤ𐀶 username :: @${document.getElementById('f1')?.value || ""}\nㅤ𐀶 nominal :: ${(document.getElementById('f2')?.value || 0).toLocaleString()}\nㅤ𐀶 via :: ${document.getElementById('f3')?.value || ""}\nㅤ𐀶 pakai qris :: ${q}\nㅤ𐀶 sudah subs @roserekber? :: ${sub}`;
      }
      document.getElementById('orderOutput').value = out;
    }

    function copyText() {
      const area = document.getElementById('orderOutput');
      area.select();
      navigator.clipboard.writeText(area.value);
      alert("Format disalin ke clipboard!");
    }

    initForm();
  </script>
</body>
</html>
