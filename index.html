<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rose Rekber - Professional Interface</title>
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-blue-dark: #0077b3;
            --tg-bg: #f0f2f5;
            --tg-text: #222222;
            --tg-hint: #707579;
            --bubble-bot: #ffffff;
            --radius: 14px;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background: #e7ebf0; color: var(--tg-text);
            display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }

        .phone-frame {
            width: 100%; max-width: 450px; height: 100%;
            background: var(--tg-bg); display: flex; flex-direction: column;
            position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1);
        }

        /* HEADER */
        .app-bar {
            background: white; color: var(--tg-text); padding: 10px 16px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #dcdfe2; z-index: 10;
        }
        .avatar {
            width: 42px; height: 42px; 
            background: linear-gradient(135deg, #50a7ea, #229ed9); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; color: white; font-size: 1.2rem;
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1; overflow-y: auto; padding: 15px;
            background: #cbd3d9 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .bubble {
            max-width: 90%; padding: 12px 14px; border-radius: var(--radius);
            margin-bottom: 15px; font-size: 0.95rem; line-height: 1.4;
            position: relative; box-shadow: var(--shadow);
            background: var(--bubble-bot); border-bottom-left-radius: 4px;
        }

        /* INPUT CARD */
        .input-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); border-radius: var(--radius);
            padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }

        .field-box {
            background: #f4f4f5; border: 1px solid #e0e0e0;
            border-radius: 10px; padding: 8px 12px; transition: 0.2s;
        }
        .field-box:focus-within { border-color: var(--tg-blue); background: #fff; }
        .field-box label { font-size: 0.65rem; color: var(--tg-blue); display: block; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .field-box input, .field-box select {
            width: 100%; border: none; background: transparent; outline: none;
            font-size: 0.95rem; color: #000; padding: 2px 0;
        }

        /* OUTPUT DISPLAY */
        .result-bubble {
            background: #ffffff; border-radius: 12px; padding: 15px;
            font-family: 'Courier New', Courier, monospace; font-size: 0.82rem;
            white-space: pre-wrap; border-left: 4px solid var(--tg-blue);
            margin-top: 10px; color: #333; line-height: 1.5;
        }

        /* NAVIGATION & BUTTON */
        .nav-wrapper { background: #fff; border-top: 1px solid #dcdfe2; padding-bottom: env(safe-area-inset-bottom); }
        .tabs { display: flex; padding: 5px; gap: 5px; }
        .tab-btn {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            color: var(--tg-hint); font-size: 0.75rem; font-weight: bold;
            border-radius: 8px; transition: 0.2s;
        }
        .tab-btn.active { background: #e5f2fa; color: var(--tg-blue); }

        .btn-send {
            background: var(--tg-blue); color: white; border: none;
            width: calc(100% - 30px); margin: 0 15px 15px; padding: 14px;
            font-weight: bold; border-radius: 12px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
        }
        .btn-send:active { transform: scale(0.98); background: var(--tg-blue-dark); }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="app-bar">
        <div class="avatar">R</div>
        <div>
            <div style="font-weight: bold; font-size: 1rem;">Rose System Bot</div>
            <div style="font-size: 0.75rem; color: #31a24c; font-weight: 500;">bot otomatis aktif</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="bubble">
            Silahkan lengkapi data transaksi di bawah untuk mendapatkan format otomatis.
        </div>

        <div class="input-card">
            <div id="input-section" class="input-grid">
                <!-- Fields Injected by JS -->
            </div>

            <div class="input-grid" style="margin-top: 10px;">
                <div class="field-box">
                    <label>Pakai QRIS?</label>
                    <select id="g_qris" onchange="updateFormat()">
                        <option value="no">Tidak</option>
                        <option value="yes only dana">Ya (Dana Only)</option>
                    </select>
                </div>
                <div class="field-box">
                    <label>Subscription</label>
                    <select id="g_subs" onchange="updateFormat()">
                        <option value="sudah">Sudah Subs</option>
                        <option value="belum">Belum Subs</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="output" class="result-bubble">Menunggu data...</div>
    </div>

    <div class="nav-wrapper">
        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('rekber', this)">REKBER</div>
            <div class="tab-btn" onclick="switchTab('jaspin', this)">JASPIN</div>
            <div class="tab-btn" onclick="switchTab('convert', this)">CONVERT</div>
        </div>
        <button class="btn-send" onclick="copyResult()">SALIN & KIRIM KE BOT</button>
    </div>
</div>

<script>
    let activeTab = 'rekber';

    function formatTitik(n) {
        if (!n) return "0";
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function handleInputNominal(el) {
        let val = el.value.replace(/\D/g, '');
        el.dataset.raw = val;
        el.value = val ? formatTitik(val) : '';
        updateFormat();
    }

    function switchTab(type, btn) {
        activeTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFields();
    }

    function renderFields() {
        const container = document.getElementById('input-section');
        container.innerHTML = ""; // Clear

        if(activeTab === 'rekber') {
            container.innerHTML = `
                <div class="field-box"><label>Username Seller</label><input type="text" id="r_sell" placeholder="@..." oninput="updateFormat()"></div>
                <div class="field-box"><label>Username Buyer</label><input type="text" id="r_buy" placeholder="@..." oninput="updateFormat()"></div>
                <div class="field-box full-width"><label>Jenis Item/Orderan</label><input type="text" id="r_item" placeholder="Contoh: Akun ML" oninput="updateFormat()"></div>
                <div class="field-box"><label>Nominal Transaksi</label><input type="text" id="r_nom" placeholder="0" oninput="handleInputNominal(this)"></div>
                <div class="field-box"><label>Fee Ditanggung</label><select id="r_tax" onchange="updateFormat()"><option value="pembeli">Pembeli</option><option value="penjual">Penjual</option></select></div>
                <div class="field-box"><label>Seller Via</label><input type="text" id="r_vp" placeholder="Dana/Gopay" oninput="updateFormat()"></div>
                <div class="field-box"><label>Buyer Via</label><input type="text" id="r_vb" placeholder="Dana/Qris" oninput="updateFormat()"></div>
            `;
        } else if(activeTab === 'jaspin') {
            container.innerHTML = `
                <div class="field-box full-width"><label>Username Pengguna</label><input type="text" id="j_user" placeholder="@..." oninput="updateFormat()"></div>
                <div class="field-box"><label>Nominal Jaspin</label><input type="text" id="j_nom" placeholder="0" oninput="handleInputNominal(this)"></div>
                <div class="field-box"><label>Fee Jaspin</label><input type="text" id="j_fee" value="1.000" readonly></div>
                <div class="field-box full-width"><label>Tujuan (Nomor + A.N)</label><input type="text" id="j_nan" placeholder="08xxx a.n ..." oninput="updateFormat()"></div>
            `;
        } else {
            container.innerHTML = `
                <div class="field-box full-width"><label>Username Pengguna</label><input type="text" id="c_user" placeholder="@..." oninput="updateFormat()"></div>
                <div class="field-box"><label>Nominal Convert</label><input type="text" id="c_nom" placeholder="0" oninput="handleInputNominal(this)"></div>
                <div class="field-box"><label>Metode</label><select id="c_met" onchange="updateFormat()"><option value="E-Wallet">E-Wallet</option><option value="Bank">Bank</option></select></div>
                <div class="field-box"><label>Dari</label><input type="text" id="c_dari" placeholder="Dana" oninput="updateFormat()"></div>
                <div class="field-box"><label>Ke</label><input type="text" id="c_ke" placeholder="Gopay" oninput="updateFormat()"></div>
            `;
        }
        updateFormat();
    }

    function updateFormat() {
        let output = "";
        const qris = document.getElementById('g_qris').value;
        const subs = document.getElementById('g_subs').value === "sudah" ? "Sudah" : "Belum";

        if(activeTab === 'rekber') {
            let nom = parseInt(document.getElementById('r_nom')?.dataset.raw) || 0;
            let tax = document.getElementById('r_tax')?.value;
            
            // Logika Fee Rekber LENGKAP
            let feeRek = 0; let isP = true;
            if(nom < 10000) feeRek = 0;
            else if(nom < 20000) feeRek = 30;
            else if(nom < 60000) feeRek = 100;
            else if(nom < 400000) feeRek = 200;
            else if(nom < 1000000) { feeRek = 2000; isP = false; }
            else { feeRek = 5000; isP = false; }

            let feeDisplay = (isP && feeRek > 0) ? feeRek + "p" : formatTitik(feeRek);

            output = `🪷 𓏸  FORMAT REKBER E WALLET ☏\n\n` +
                     `ㅤ𐀶. . username penjual :: @${document.getElementById('r_sell')?.value || "..."}\n` +
                     `ㅤ𐀶. . username pembeli :: @${document.getElementById('r_buy')?.value || "..."}\n` +
                     `ㅤ𐀶. . jenis orderan :: ${document.getElementById('r_item')?.value || "..."}\n` +
                     `ㅤ𐀶. . nominal :: Rp ${formatTitik(nom)}\n` +
                     `ㅤ𐀶. . fee rekber :: ${feeDisplay}\n` +
                     `ㅤ𐀶. . fee ditanggung :: ${tax}\n` +
                     `ㅤ𐀶. . penjual via :: ${document.getElementById('r_vp')?.value || "..."}\n` +
                     `ㅤ𐀶. . pembeli via :: ${document.getElementById('r_vb')?.value || "..."}\n` +
                     `ㅤ𐀶. . pakai qris :: ${qris}\n` +
                     `ㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
        } 
        else if(activeTab === 'jaspin') {
            let nom = parseInt(document.getElementById('j_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT JASPIN ☏\n\n` +
                     `ㅤ𐀶. . username :: @${document.getElementById('j_user')?.value || "..."}\n` +
                     `ㅤ𐀶. . nominal :: Rp ${formatTitik(nom)}\n` +
                     `ㅤ𐀶. . fee jaspin :: 1.000\n` +
                     `ㅤ𐀶. . nomor + a.n :: ${document.getElementById('j_nan')?.value || "..."}\n` +
                     `ㅤ𐀶. . pakai qris :: ${qris}\n` +
                     `ㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
        } 
        else {
            let nom = parseInt(document.getElementById('c_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT CONVERT ☏\n\n` +
                     `ㅤ𐀶. . username :: @${document.getElementById('c_user')?.value || "..."}\n` +
                     `ㅤ𐀶. . nominal :: Rp ${formatTitik(nom)}\n` +
                     `ㅤ𐀶. . via :: ${document.getElementById('c_dari')?.value || "..."} ke ${document.getElementById('c_ke')?.value || "..."}\n` +
                     `ㅤ𐀶. . metode :: ${document.getElementById('c_met')?.value}\n` +
                     `ㅤ𐀶. . pakai qris :: ${qris}\n` +
                     `ㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
        }
        document.getElementById('output').innerText = output;
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        if(text === "Menunggu data...") return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("Format berhasil disalin!");
            window.open("https://t.me/rosereksysbot", "_blank");
        });
    }

    // Initialize
    renderFields();
</script>
</body>
</html>
