<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Rekber - Telegram Premium Edition</title>
    <style>
        :root {
            --tg-blue: #24A1DE;
            --tg-blue-dark: #1d86b9;
            --tg-blue-light: #40b3e6;
            --tg-bg: #f4f4f5;
            --tg-text: #222222;
            --tg-gray: #8E8E93;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            color: var(--tg-text);
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Animations --- */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            background: var(--white);
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .active-page { transform: translateX(0); opacity: 1; pointer-events: auto; }

        /* --- Halaman 1: Home --- */
        .home-content { padding: 25px; text-align: center; }

        .promo-card {
            background: linear-gradient(135deg, var(--tg-blue), var(--tg-blue-dark));
            color: white;
            padding: 35px 20px;
            border-radius: 24px;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 40px;
            box-shadow: 0 10px 20px rgba(36, 161, 222, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .main-order-btn {
            width: 160px;
            height: 160px;
            background: var(--white);
            border: 6px solid var(--tg-blue);
            color: var(--tg-blue);
            border-radius: 50%;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .main-order-btn:hover { background: var(--tg-blue); color: white; transform: scale(1.05); }

        .list-container {
            background: var(--tg-bg);
            border-radius: 20px;
            padding: 10px;
        }

        .list-item {
            background: var(--white);
            margin: 8px 0;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--tg-blue);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .list-item:active { transform: scale(0.98); background: #e8e8e8; }
        .list-item::after { content: '›'; font-size: 1.5rem; }

        /* --- Halaman 2: Order --- */
        .header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn { font-size: 24px; cursor: pointer; color: var(--tg-blue); margin-right: 15px; }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 20px;
        }

        .btn-svc {
            border: none;
            background: #f1f1f1;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            color: var(--tg-text);
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-svc.active { background: var(--tg-blue); color: white; }

        .form-area { padding: 0 20px; }
        .tg-input {
            width: 100%;
            background: var(--tg-bg);
            border: 1px solid transparent;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
            transition: 0.3s;
        }
        .tg-input:focus { border-color: var(--tg-blue); background: white; }

        .result-box {
            background: #242f3d;
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            margin: 15px 0;
            line-height: 1.5;
            position: relative;
        }

        .action-btn {
            width: 100%;
            background: var(--tg-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(36, 161, 222, 0.3);
        }

        /* --- Sidebar Overlay --- */
        .overlay {
            position: absolute;
            top: 0; right: -100%;
            width: 75%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 50px 25px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }
        .overlay.open { right: 0; }
        .overlay-item {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--tg-text);
            text-decoration: none;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .footer-tag { margin-top: 30px; color: var(--tg-gray); font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- HALAMAN 1 -->
    <div id="p1" class="page active-page">
        <div class="home-content">
            <div class="promo-card">ROSE REKBER<br><span style="font-size: 0.9rem; opacity: 0.8;">Safe & Fast Transaction</span></div>
            <div class="main-order-btn" onclick="nav('p1', 'p2')">Tap to Order</div>
            
            <div class="list-container">
                <a href="https://t.me/roserekber" class="list-item">Rate & Kritsar</a>
                <a href="https://t.me/roserekber" class="list-item">Testimonial</a>
                <a href="https://t.me/roserekber" class="list-item">List Admin</a>
            </div>
            <div class="footer-tag">@rekber tele</div>
        </div>
    </div>

    <!-- HALAMAN 2 -->
    <div id="p2" class="page hidden-right">
        <div class="header">
            <div class="back-btn" onclick="nav('p2', 'p1')">←</div>
            <div style="flex-grow: 1; font-weight: bold;">@rekberrtele</div>
            <div class="back-btn" onclick="toggleMenu()" style="margin-right:0">☰</div>
        </div>

        <div class="grid-menu">
            <button class="btn-svc active" onclick="setSvc('rekber', this)">REKBER</button>
            <button class="btn-svc" onclick="setSvc('jaspin', this)">JASPIN</button>
            <button class="btn-svc" onclick="setSvc('convert', this)">CONVERT</button>
            <button class="btn-svc" onclick="window.location.href='https://t.me/roserekber'">JASGET</button>
        </div>

        <div class="form-area">
            <div id="form-fields">
                <!-- Fields akan diatur lewat JS -->
                <input type="text" id="in1" class="tg-input" placeholder="User Penjual">
                <input type="text" id="in2" class="tg-input" placeholder="User Pembeli">
                <input type="number" id="in3" class="tg-input" placeholder="Nominal">
            </div>

            <select id="qris" class="tg-input" onchange="update()">
                <option value="no">Pakai QRIS? No</option>
                <option value="yes">Pakai QRIS? Yes</option>
            </select>

            <div class="result-box" id="result">Hasil format otomatis...</div>
            <button class="action-btn" onclick="copy()">SALIN FORMAT</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="overlay">
        <div style="font-size: 30px; margin-bottom: 40px; cursor: pointer; color: var(--tg-blue);" onclick="toggleMenu()">× Close</div>
        <a href="https://t.me/roserekber" class="overlay-item">REGULATION</a>
        <a href="https://t.me/roserekber" class="overlay-item">CARA KERJA</a>
        <a href="https://t.me/roserekber" class="overlay-item">VERIFIED BY</a>
        <a href="https://t.me/roserekber" class="overlay-item">BOT LAPORAN</a>
        <a href="https://t.me/roserekber" class="overlay-item">REQUEST</a>
    </div>

</div>

<script>
    let currentSvc = 'rekber';

    // Navigation System
    function nav(from, to) {
        document.getElementById(from).classList.remove('active-page');
        if(to === 'p2') document.getElementById(from).classList.add('hidden-left');
        else document.getElementById(from).classList.add('hidden-right');

        document.getElementById(to).classList.remove('hidden-left', 'hidden-right');
        document.getElementById(to).classList.add('active-page');
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function setSvc(type, btn) {
        currentSvc = type;
        document.querySelectorAll('.btn-svc').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const fields = document.getElementById('form-fields');
        if(type === 'rekber') {
            fields.innerHTML = `
                <input type="text" id="r1" class="tg-input" placeholder="User Penjual" oninput="update()">
                <input type="text" id="r2" class="tg-input" placeholder="User Pembeli" oninput="update()">
                <input type="number" id="r3" class="tg-input" placeholder="Nominal" oninput="update()">
            `;
        } else if(type === 'jaspin') {
            fields.innerHTML = `
                <input type="text" id="j1" class="tg-input" placeholder="Username" oninput="update()">
                <input type="number" id="j2" class="tg-input" placeholder="Nominal" oninput="update()">
            `;
        } else {
            fields.innerHTML = `
                <input type="number" id="c1" class="tg-input" placeholder="Nominal Convert" oninput="update()">
            `;
        }
        update();
    }

    function update() {
        let text = "";
        let qris = document.getElementById('qris').value;
        
        if(currentSvc === 'rekber') {
            let n = document.getElementById('r3')?.value || 0;
            text = `🔹 REKBER FORM 🔹\n\nPenjual: @${document.getElementById('r1')?.value || '...'}\nPembeli: @${document.getElementById('r2')?.value || '...'}\nNominal: Rp ${n}\nQRIS: ${qris}`;
        } else if(currentSvc === 'jaspin') {
            text = `🔸 JASPIN FORM 🔸\n\nUser: @${document.getElementById('j1')?.value || '...'}\nNom: Rp ${document.getElementById('j2')?.value || 0}`;
        } else {
            text = `💠 CONVERT FORM 💠\n\nNominal: Rp ${document.getElementById('c1')?.value || 0}\nQRIS: ${qris}`;
        }
        document.getElementById('result').innerText = text;
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('result').innerText);
        alert("Format disalin ke clipboard!");
    }

    // Init
    setSvc('rekber', document.querySelector('.btn-svc'));
</script>

</body>
</html>
