\<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>iOS Style - Order Form</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --card: rgba(255,255,255,.9);
      --text: #0f172a;
      --tg: #229ED9;
      --muted: rgba(15,23,42,.5);
      --radius-xl: 28px;
      --shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      background: var(--bg);
      min-height: 100vh;
      position: relative;
      padding-bottom: 100px;
    }

    /* Header iOS Style */
    header {
      padding: 40px 20px 20px;
      background: rgba(244,246,250,0.8);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { margin: 0; font-size: 24px; font-weight: 800; }

    /* Container & Cards */
    .content { padding: 0 20px; }
    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* Tabs */
    .tab-pills {
      display: flex;
      background: rgba(0,0,0,0.05);
      padding: 4px;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .tab-pills button {
      flex: 1; border: none; padding: 10px; border-radius: 11px;
      background: transparent; font-weight: 600; cursor: pointer; color: var(--muted);
    }
    .tab-pills button.active { background: white; color: var(--tg); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

    /* Form Fields */
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--tg); text-transform: uppercase; margin-bottom: 5px; margin-left: 4px; }
    .field input, .field select {
      width: 100%; padding: 14px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05);
      background: white; outline: none; font-size: 15px;
    }

    /* Result Box */
    #orderText {
      width: 100%; min-height: 150px; background: #f9f9f9; border-radius: 20px;
      padding: 15px; font-family: monospace; font-size: 12px; line-height: 1.5;
      border: 1px dashed #ddd; resize: none; outline: none; margin-top: 10px;
    }

    /* Actions */
    .btn-main {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      background: var(--tg); color: white; font-weight: 800; font-size: 16px;
      box-shadow: 0 10px 25px rgba(34,158,217,0.3); cursor: pointer;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 380px; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px); padding: 10px; border-radius: 30px;
      display: flex; justify-content: space-around; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .nav-item { border: none; background: transparent; color: var(--muted); font-weight: 700; font-size: 12px; padding: 10px 20px; border-radius: 20px; }
    .nav-item.active { color: var(--tg); background: rgba(34,158,217,0.1); }
  </style>
</head>
<body>

  <div class="phone">
    <header>
      <h1>Order Form</h1>
    </header>

    <div class="content">
      <div class="tab-pills">
        <button id="btn-rekber" class="active" onclick="setService('rekber')">Rekber</button>
        <button id="btn-jaspin" onclick="setService('jaspin')">Jaspin</button>
        <button id="btn-convert" onclick="setService('convert')">Convert</button>
      </div>

      <div class="card">
        <div id="dynamic-fields">
          <!-- JS Injected -->
        </div>

        <div class="field">
          <label>Pake Qris?</label>
          <select id="qris_global" onchange="updateAll()">
            <option value="no">No</option>
            <option value="yes only dana">Yes Only Dana</option>
          </select>
        </div>

        <div class="field">
          <label>Sudah Subs @roserekber?</label>
          <select id="subs_global" onchange="updateAll()">
            <option value="sudah">Sudah</option>
            <option value="belum">Belum</option>
          </select>
        </div>

        <textarea id="orderText" readonly></textarea>
        <div style="margin-top: 20px;">
          <button class="btn-main" onclick="copyAction()">SALIN & KIRIM</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-item active">Home</button>
      <button class="nav-item">History</button>
      <button class="nav-item">Settings</button>
    </nav>
  </div>

  <script>
    let currentService = 'rekber';

    function setService(s) {
      currentService = s;
      const container = document.getElementById('dynamic-fields');
      document.querySelectorAll('.tab-pills button').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + s).classList.add('active');

      if (s === 'rekber') {
        container.innerHTML = `
          <div class="field"><label>Username Seller</label><input type="text" id="r_sell" placeholder="@..." oninput="updateAll()"></div>
          <div class="field"><label>Username Buyer</label><input type="text" id="r_buy" placeholder="@..." oninput="updateAll()"></div>
          <div class="field"><label>Jenis Item</label><input type="text" id="r_item" placeholder="Akun ML" oninput="updateAll()"></div>
          <div class="field"><label>Nominal</label><input type="text" id="r_nom" placeholder="0" oninput="handleNominal(this)"></div>
          <div class="field"><label>Seller Via</label><input type="text" id="r_vp" placeholder="Dana" oninput="updateAll()"></div>
          <div class="field"><label>Buyer Via</label><input type="text" id="r_vb" placeholder="Dana" oninput="updateAll()"></div>
        `;
      } else if (s === 'jaspin') {
        container.innerHTML = `
          <div class="field"><label>Username</label><input type="text" id="j_user" placeholder="@..." oninput="updateAll()"></div>
          <div class="field"><label>Nominal</label><input type="text" id="j_nom" placeholder="0" oninput="handleNominal(this)"></div>
          <div class="field"><label>Nomor + A.N</label><input type="text" id="j_nan" placeholder="08xxx a.n ..." oninput="updateAll()"></div>
        `;
      } else {
        container.innerHTML = `
          <div class="field"><label>Username</label><input type="text" id="c_user" placeholder="@..." oninput="updateAll()"></div>
          <div class="field"><label>Nominal</label><input type="text" id="c_nom" placeholder="0" oninput="handleNominal(this)"></div>
          <div class="field"><label>Dari - Ke</label><input type="text" id="c_way" placeholder="Dana ke Gopay" oninput="updateAll()"></div>
        `;
      }
      updateAll();
    }

    function handleNominal(el) {
      let val = el.value.replace(/\D/g, '');
      el.dataset.raw = val;
      el.value = val ? val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '';
      updateAll();
    }

    function updateAll() {
      const qris = document.getElementById('qris_global').value;
      const subs = document.getElementById('subs_global').value;
      let output = "";

      if (currentService === 'rekber') {
        let nom = parseInt(document.getElementById('r_nom')?.dataset.raw) || 0;
        let fee = 0; let isP = true;
        if(nom < 10000) fee = 0;
        else if(nom < 20000) fee = 30;
        else if(nom < 60000) fee = 100;
        else if(nom < 400000) fee = 200;
        else if(nom < 1000000) { fee = 2000; isP = false; }
        else { fee = 5000; isP = false; }
        let fDisp = (isP && fee > 0) ? fee + "p" : fee.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        output = `🪷 𓏸  FORMAT REKBER E WALLET ☏\n\nㅤ𐀶. . username penjual :: @${document.getElementById('r_sell')?.value || "..."}\nㅤ𐀶. . username pembeli :: @${document.getElementById('r_buy')?.value || "..."}\nㅤ𐀶. . jenis orderan :: ${document.getElementById('r_item')?.value || "..."}\nㅤ𐀶. . nominal :: ${document.getElementById('r_nom')?.value || "0"}\nㅤ𐀶. . fee rekber :: ${fDisp}\nㅤ𐀶. . penjual via :: ${document.getElementById('r_vp')?.value || "..."}\nㅤ𐀶. . pembeli via :: ${document.getElementById('r_vb')?.value || "..."}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
      } else if(currentService === 'jaspin') {
        output = `🪷 𓏸  FORMAT JASPIN ☏\n\nㅤ𐀶. . username :: @${document.getElementById('j_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${document.getElementById('j_nom')?.value || "0"}\nㅤ𐀶. . fee :: 1.000\nㅤ𐀶. . nomor + a.n :: ${document.getElementById('j_nan')?.value || "..."}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
      } else {
        output = `🪷 𓏸  FORMAT CONVERT ☏\n\nㅤ𐀶. . username :: @${document.getElementById('c_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${document.getElementById('c_nom')?.value || "0"}\nㅤ𐀶. . via :: ${document.getElementById('c_way')?.value || "..."}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
      }
      document.getElementById('orderText').value = output;
    }

    function copyAction() {
      const area = document.getElementById('orderText');
      area.select();
      navigator.clipboard.writeText(area.value);
      alert("Format disalin!");
    }

    window.onload = () => setService('rekber');
  </script>
</body>
</html>
