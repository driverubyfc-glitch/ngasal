<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Rekber - Telegram Layout</title>
    <style>
        :root {
            --tg-blue: #0088cc;
            --tg-light-blue: #eff7ff;
            --tg-dark: #242f3d;
            --tg-gray: #707579;
            --bg-body: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow-x: hidden;
        }

        /* --- HALAMAN 1 (HOME) --- */
        #home-page { padding: 20px; text-align: center; display: block; }
        
        .promo-banner {
            background: var(--tg-blue);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 50px;
            box-shadow: 0 4px 12px rgba(0,136,204,0.3);
        }

        .tap-order-btn {
            width: 180px;
            height: 180px;
            background: var(--tg-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            border: 8px solid var(--tg-light-blue);
            transition: transform 0.2s;
        }
        .tap-order-btn:active { transform: scale(0.95); }

        .bottom-menu-container {
            background: var(--tg-light-blue);
            padding: 20px;
            border-radius: 20px;
        }
        .menu-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            color: var(--tg-blue);
            text-decoration: none;
            display: block;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- HALAMAN 2 (ORDER/FORM) --- */
        #order-page { display: none; padding: 15px; }
        
        .header-order {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; }
        
        .grid-services {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .svc-btn {
            background: var(--tg-dark);
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .svc-btn.active { background: var(--tg-blue); }

        .form-container {
            background: #eee;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .output-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.85rem;
            border: 1px solid #ddd;
        }

        /* --- HALAMAN 3 (SIDEBAR/OVERLAY) --- */
        #sidebar {
            position: absolute;
            top: 0; right: -100%;
            width: 80%;
            height: 100%;
            background: #999;
            z-index: 100;
            transition: 0.3s;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        #sidebar.open { right: 0; }
        .side-item {
            color: black;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-decoration: none;
            display: block;
            text-transform: uppercase;
        }

        .hamburger { cursor: pointer; font-size: 24px; }
        .footer-link { margin-top: 20px; display: block; color: var(--tg-gray); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <!-- HALAMAN 1 -->
    <div id="home-page">
        <div class="promo-banner">TEXT PROMOSI</div>
        <div class="tap-order-btn" onclick="showOrderPage()">Tap to order</div>
        <div class="bottom-menu-container">
            <a href="https://t.me/roserekber" class="menu-item">Rate And Kritsar</a>
            <a href="https://t.me/roserekber" class="menu-item">Testimonial</a>
            <a href="https://t.me/roserekber" class="menu-item">List Admin</a>
        </div>
        <a href="https://t.me/roserekber" class="footer-link">@rekber tele</a>
    </div>

    <!-- HALAMAN 2 -->
    <div id="order-page">
        <div class="header-order">
            <div class="profile-section">
                <div class="avatar" onclick="showHomePage()">BACK</div>
                <span style="font-weight: bold;">@rekberrtele</span>
            </div>
            <div class="hamburger" onclick="toggleSidebar()">☰</div>
        </div>

        <h2 style="text-align: center; color: #2d5a27;">top rekber needs</h2>
        
        <div class="grid-services">
            <button class="svc-btn active" onclick="switchSvc('rekber', this)">Rekber Ewallet</button>
            <button class="svc-btn" onclick="switchSvc('jaspin', this)">Jaspin</button>
            <button class="svc-btn" onclick="switchSvc('convert', this)">Convert Ewallet</button>
            <button class="svc-btn" onclick="window.location.href='https://t.me/roserekber'">Jasget</button>
        </div>

        <button class="svc-btn" style="width: 100%; margin-bottom: 20px;" onclick="window.location.href='https://t.me/roserekber'">KATALOG LAINNYA</button>

        <div class="form-container">
            <div id="rekber-fields">
                <input type="text" id="r_penjual" placeholder="User Penjual" oninput="updateAll()">
                <input type="text" id="r_pembeli" placeholder="User Pembeli" oninput="updateAll()">
                <input type="text" id="r_item" placeholder="Jenis Orderan" oninput="updateAll()">
                <input type="number" id="r_nom" placeholder="Nominal" oninput="updateAll()">
                <input type="text" id="r_via_p" placeholder="Penjual Via (e.g Dana)" oninput="updateAll()">
                <input type="text" id="r_via_b" placeholder="Pembeli Via (e.g Dana)" oninput="updateAll()">
            </div>

            <div id="jaspin-fields" style="display:none;">
                <input type="text" id="j_user" placeholder="Username" oninput="updateAll()">
                <input type="number" id="j_nom" placeholder="Nominal" oninput="updateAll()">
                <input type="text" id="j_nan" placeholder="Nomor + A.N" oninput="updateAll()">
            </div>

            <div id="convert-fields" style="display:none;">
                <select id="c_tipe" onchange="updateAll()">
                    <option value="prem">Premium</option>
                    <option value="nonprem">Non-Premium</option>
                </select>
                <input type="text" id="c_user" placeholder="Username" oninput="updateAll()">
                <input type="number" id="c_nom" placeholder="Nominal" oninput="updateAll()">
            </div>

            <select id="global_qris" onchange="updateAll()">
                <option value="no">Pakai QRIS? No</option>
                <option value="yes only dana">Pakai QRIS? Yes (Dana Only)</option>
            </select>

            <div class="output-box" id="hasilForm">Format akan muncul di sini...</div>
        </div>

        <button class="svc-btn" style="width: 100%; background: black;" onclick="copyFormat()">KIRIM KE BOT ORDER</button>
    </div>

    <!-- HALAMAN 3 (SIDEBAR) -->
    <div id="sidebar">
        <div style="text-align: right; font-size: 30px; margin-bottom: 20px; cursor: pointer;" onclick="toggleSidebar()">×</div>
        <a href="https://t.me/roserekber" class="side-item">Regulation</a>
        <a href="https://t.me/roserekber" class="side-item">Cara Kerja</a>
        <a href="https://t.me/roserekber" class="side-item">Verified By</a>
        <a href="https://t.me/roserekber" class="side-item">Bot Laporan</a>
        <a href="https://t.me/roserekber" class="side-item">Bug/Lainnya</a>
        <a href="https://t.me/roserekber" class="side-item">Informasi</a>
        <a href="https://t.me/roserekber" class="side-item">Request</a>
    </div>

</div>

<script>
    let activeSvc = 'rekber';

    function showOrderPage() {
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('order-page').style.display = 'block';
    }

    function showHomePage() {
        document.getElementById('home-page').style.display = 'block';
        document.getElementById('order-page').style.display = 'none';
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function switchSvc(type, btn) {
        activeSvc = type;
        document.querySelectorAll('.svc-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('rekber-fields').style.display = type === 'rekber' ? 'block' : 'none';
        document.getElementById('jaspin-fields').style.display = type === 'jaspin' ? 'block' : 'none';
        document.getElementById('convert-fields').style.display = type === 'convert' ? 'block' : 'none';
        updateAll();
    }

    function formatRibuan(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function updateAll() {
        let qris = document.getElementById('global_qris').value;
        let res = "";

        if(activeSvc === 'rekber') {
            let nom = parseInt(document.getElementById('r_nom').value) || 0;
            let v_p = document.getElementById('r_via_p').value.toLowerCase();
            let v_b = document.getElementById('r_via_b').value.toLowerCase();
            let fee = 0;
            if(nom < 20000) fee = 30; else if(nom < 60000) fee = 100; else if(nom < 400000) fee = 200; else fee = 5000;
            
            // Logika CV Otomatis
            if(v_p !== v_b && v_p !== "" && v_b !== "") {
                fee += (qris === "no" ? 2000 : 5000); 
            }

            res = `🪷 FORMAT REKBER\n\nPenjual: @${document.getElementById('r_penjual').value}\nPembeli: @${document.getElementById('r_pembeli').value}\nItem: ${document.getElementById('r_item').value}\nNominal: ${formatRibuan(nom)}\nFee: ${formatRibuan(fee)}\nVia P: ${v_p}\nVia B: ${v_b}`;
        } 
        else if(activeSvc === 'jaspin') {
            let nom = parseInt(document.getElementById('j_nom').value) || 0;
            let fee = (nom * 0.05);
            res = `🪷 FORMAT JASPIN\n\nUser: @${document.getElementById('j_user').value}\nNominal: ${formatRibuan(nom)}\nFee: ${formatRibuan(fee)}\nNomor: ${document.getElementById('j_nan').value}`;
        }
        else if(activeSvc === 'convert') {
            let nom = parseInt(document.getElementById('c_nom').value) || 0;
            res = `🪷 FORMAT CONVERT\n\nUser: @${document.getElementById('c_user').value}\nNominal: ${formatRibuan(nom)}\nRate: 0.95`;
        }

        document.getElementById('hasilForm').innerText = res;
    }

    function copyFormat() {
        navigator.clipboard.writeText(document.getElementById('hasilForm').innerText);
        alert("Format Berhasil Disalin!");
    }
</script>

</body>
</html>
