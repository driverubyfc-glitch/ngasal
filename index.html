<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Rekber - Smart Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 480px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: #ddd; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: #d63384; color: white; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        h3 { text-align: center; color: #d63384; margin-top: 0; }
        label { font-size: 0.85rem; font-weight: bold; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .output-box { background: #fff5f8; padding: 15px; margin-top: 15px; white-space: pre-wrap; border: 1px dashed #d63384; border-radius: 8px; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; line-height: 1.4; }
        .copy-btn { margin-top: 10px; width: 100%; padding: 12px; background: #d63384; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .copy-btn:hover { background: #b82a6e; }
        .info-fee { font-size: 0.75rem; color: #d63384; font-style: italic; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('jaspin')">Jaspin</button>
        <button class="tab-btn" onclick="openTab('convert')">Convert</button>
        <button class="tab-btn" onclick="openTab('rekber')">Rekber</button>
    </div>

    <!-- SECTION JASPIN -->
    <div id="jaspin" class="form-section active">
        <h3>🪷 Jaspin Form</h3>
        <label>Username</label>
        <input type="text" id="user_j" placeholder="roserekber" oninput="updateAll()">
        <label>Nominal</label>
        <input type="text" id="nom_j" placeholder="8.000" oninput="formatInput(this); updateAll()">
        <label>Nomor + A.N</label>
        <input type="text" id="nan_j" placeholder="0812... a.n Rose" oninput="updateAll()">
    </div>

    <!-- SECTION CONVERT -->
    <div id="convert" class="form-section">
        <h3>🪷 Convert E-wallet</h3>
        <label>Tipe E-wallet</label>
        <select id="tipe_cv" onchange="updateAll()">
            <option value="prem">E-wallet Premium</option>
            <option value="nonprem">E-wallet Non-Premium</option>
        </select>
        <label>Username</label>
        <input type="text" id="user_c" placeholder="roserekber" oninput="updateAll()">
        <label>Nominal Convert</label>
        <input type="text" id="nom_c" placeholder="500.000" oninput="formatInput(this); updateAll()">
        <label>Dari & Tujuan</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="dari_c" placeholder="Dari" oninput="updateAll()">
            <input type="text" id="ke_c" placeholder="Ke" oninput="updateAll()">
        </div>
    </div>

    <!-- SECTION REKBER -->
    <div id="rekber" class="form-section">
        <h3>🪷 Rekber E-wallet</h3>
        <label>Username Penjual</label>
        <input type="text" id="user_p_rek" placeholder="penjual" oninput="updateAll()">
        <label>Username Pembeli</label>
        <input type="text" id="user_b_rek" placeholder="pembeli" oninput="updateAll()">
        <label>Jenis Orderan</label>
        <input type="text" id="jenis_rek" placeholder="Nox, Acc, dll" oninput="updateAll()">
        <label>Nominal</label>
        <input type="text" id="nom_rek" placeholder="1.000.000" oninput="formatInput(this); updateAll()">
        
        <label>Penjual Via (E-wallet Tujuan)</label>
        <input type="text" id="p_via" placeholder="Dana" oninput="updateAll()">
        
        <label>Pembeli Via (E-wallet Asal)</label>
        <input type="text" id="b_via" placeholder="Dana" oninput="updateAll()">
        <span class="info-fee">*Jika via berbeda, fee convert otomatis ditambahkan</span>
    </div>

    <!-- GLOBAL INPUTS -->
    <label>Pakai QRIS?</label>
    <select id="qris_global" onchange="updateAll()">
        <option value="no">No</option>
        <option value="yes only dana">Yes Only Dana</option>
    </select>
    <label>Subs @roserekber?</label>
    <select id="subs_global" onchange="updateAll()">
        <option value="sudah">Sudah</option>
        <option value="belum">Belum</option>
    </select>

    <div class="output-box" id="hasilForm">Format akan muncul di sini...</div>
    <button class="copy-btn" onclick="copyText()">Salin Format</button>
</div>

<script>
let currentTab = 'jaspin';

function openTab(name) {
    currentTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById(name).classList.add('active');
    updateAll();
}

function formatRibuan(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function formatInput(el) {
    let val = el.value.replace(/\D/g, '');
    el.value = val ? formatRibuan(val) : '';
}

function updateAll() {
    if(currentTab === 'jaspin') updateJaspin();
    else if(currentTab === 'convert') updateConvert();
    else updateRekber();
}

function updateJaspin() {
    let raw = document.getElementById('nom_j').value.replace(/\./g, '');
    let nom = parseInt(raw) || 0;
    let fee = "0";
    if (nom >= 10 && nom < 1000) fee = "free";
    else if (nom >= 1000) {
        let val = (nom < 21000) ? (Math.floor(nom/1000)*10 - 5) : (195 + (Math.floor(nom/1000)-20)*10);
        fee = val < 1000 ? val + "p" : formatRibuan(val);
    }
    let template = `ㅤㅤ ㅤ🪷 𓏸  FORMAT JASPIN ☏\n\nㅤ𐀶. . username :: @${document.getElementById('user_j').value || "..."}\nㅤ𐀶. . jaspin nominal :: ${formatRibuan(raw) || "0"}\nㅤ𐀶. . fee jaspin :: ${fee}\nㅤ𐀶. . nomor + a.n :: ${document.getElementById('nan_j').value || "..."}\nㅤ𐀶. . pakai qris :: ${document.getElementById('qris_global').value}\nㅤ𐀶. . sudah subs @roserekber ? :: ${document.getElementById('subs_global').value}`;
    document.getElementById('hasilForm').innerText = template;
}

function updateConvert() {
    let raw = document.getElementById('nom_c').value.replace(/\./g, '');
    let nom = parseInt(raw) || 0;
    let tipe = document.getElementById('tipe_cv').value;
    let feeDisplay = "0";
    if (tipe === 'prem') {
        feeDisplay = formatRibuan((Math.floor(nom / 100000) + 1) * 1000);
    } else {
        if (nom < 20000) feeDisplay = "2.000";
        else if (nom < 50000) feeDisplay = "3.000";
        else if (nom < 100000) feeDisplay = "4.000";
        else if (nom < 200000) feeDisplay = "6.000";
        else if (nom < 300000) feeDisplay = "8.000";
        else if (nom < 400000) feeDisplay = "10.000";
        else if (nom < 500000) feeDisplay = "12.000";
        else {
            let rate = Math.max(0.70, 0.97 - (Math.floor((nom - 500000) / 500000) * 0.01)); 
            feeDisplay = `${formatRibuan(Math.round(nom - (nom * rate)))} (Rate ${rate.toFixed(2)})`;
        }
    }
    let template = `ㅤㅤ ㅤ🪷 𓏸  FORMAT CONVERT ☏\n\nㅤ𐀶. . username :: @${document.getElementById('user_c').value || "..."}\nㅤ𐀶. . cv nominal :: ${formatRibuan(raw) || "0"}\nㅤ𐀶. . fee convert :: ${feeDisplay}\nㅤ𐀶. . dari ewallet :: ${document.getElementById('dari_c').value || "..."}\nㅤ𐀶. . ewallet tujuan :: ${document.getElementById('ke_c').value || "..."}\nㅤ𐀶. . pakai qris :: ${document.getElementById('qris_global').value}\nㅤ𐀶. . sudah subs @roserekber ? :: ${document.getElementById('subs_global').value}`;
    document.getElementById('hasilForm').innerText = template;
}

function updateRekber() {
    let raw = document.getElementById('nom_rek').value.replace(/\./g, '');
    let nom = parseInt(raw) || 0;
    let v_p = document.getElementById('p_via').value.toLowerCase().trim();
    let v_b = document.getElementById('b_via').value.toLowerCase().trim();
    let qris = document.getElementById('qris_global').value;
    
    // 1. HITUNG FEE REKBER MURNI
    let feeRekValue = 0;
    let isPerak = true;

    if (nom < 10000) feeRekValue = 0;
    else if (nom < 20000) feeRekValue = 30;
    else if (nom < 60000) feeRekValue = 100;
    else if (nom < 400000) feeRekValue = 200;
    else if (nom < 600000) feeRekValue = 350;
    else if (nom < 700000) feeRekValue = 550;
    else if (nom < 800000) feeRekValue = 950;
    else if (nom < 1000000) { feeRekValue = 2000; isPerak = false; }
    else if (nom <= 2000000) { feeRekValue = 5000; isPerak = false; }
    else { feeRekValue = 8000; isPerak = false; }

    // 2. LOGIKA CONVERT OTOMATIS
    let feeCvValue = 0;
    let infoCv = "";

    if (v_p !== "" && v_b !== "" && v_p !== v_b) {
        if (qris.includes("yes")) {
            // Pakai QRIS -> Non Prem
            if (nom < 20000) feeCvValue = 2000;
            else if (nom < 50000) feeCvValue = 3000;
            else if (nom < 100000) feeCvValue = 4000;
            else if (nom < 200000) feeCvValue = 6000;
            else if (nom < 300000) feeCvValue = 8000;
            else if (nom < 400000) feeCvValue = 10000;
            else if (nom < 500000) feeCvValue = 12000;
            else {
                let rate = Math.max(0.70, 0.97 - (Math.floor((nom - 500000) / 500000) * 0.01));
                feeCvValue = Math.round(nom - (nom * rate));
            }
            infoCv = " (inc cv non-prem)";
        } else {
            // Gak pakai QRIS -> Prem
            feeCvValue = (Math.floor(nom / 100000) + 1) * 1000;
            infoCv = " (inc cv prem)";
        }
    }

    let totalFeeValue = feeRekValue + feeCvValue;
    let feeFinal = (totalFeeValue < 1000 && isPerak && feeCvValue === 0) ? totalFeeValue + "p" : formatRibuan(totalFeeValue);

    let template = `🪷 𓏸  FORMAT REKBER E WALLET ☏\n\nㅤ𐀶. . username penjual :: @${document.getElementById('user_p_rek').value || "..."}\nㅤ𐀶. . username pembeli :: @${document.getElementById('user_b_rek').value || "..."}\nㅤ𐀶. . jenis orderan :: ${document.getElementById('jenis_rek').value || "..."}\nㅤ𐀶. . nominal :: ${formatRibuan(raw) || "0"}\nㅤ𐀶. . fee rekber :: ${feeFinal}${infoCv}\nㅤ𐀶. . penjual via :: ${document.getElementById('p_via').value || "..."}\nㅤ𐀶. . pembeli via :: ${document.getElementById('b_via').value || "..."}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${document.getElementById('subs_global').value}`;
    
    document.getElementById('hasilForm').innerText = template;
}

function copyText() {
    navigator.clipboard.writeText(document.getElementById('hasilForm').innerText);
    alert("Format disalin!");
}
</script>
</body>
</html>
