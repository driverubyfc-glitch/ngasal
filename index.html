<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Rekberr TeLe - Smart Form</title>
  <style>
    :root{
      --bg: #f4f6fa; --card: rgba(255,255,255,.86); --text: #0f172a; --muted: rgba(15,23,42,.55);
      --line: rgba(15,23,42,.10); --shadow: 0 18px 60px rgba(2,6,23,.12); --tg: #d63384; 
      --tg2: #b82a6e; --radius-xl: 28px; --blur: blur(18px); --device: 430px;
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body{ margin:0; font-family: ui-sans-serif, system-ui; background: linear-gradient(180deg, #fdf2f8, var(--bg)); display:flex; justify-content:center; padding: 18px 12px; color: var(--text); }
    .phone{ width: min(var(--device), 100%); border-radius: 36px; overflow:hidden; border: 1px solid rgba(2,6,23,.10); box-shadow: 0 30px 90px rgba(2,6,23,.20); background: var(--bg); position:relative; min-height: 844px; display: flex; flex-direction: column; }
    .top{ position: sticky; top: 0; z-index: 30; padding: 14px; background: rgba(244,246,250,.70); backdrop-filter: var(--blur); border-bottom: 1px solid rgba(15,23,42,.08); }
    .logo{ width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--tg), var(--tg2)); display:grid; place-items:center; font-weight: 900; color: white; }
    .page{ display:none; padding: 14px 14px 100px; animation: fadeIn 0.3s ease; }
    .page.active{ display:block; }
    @keyframes fadeIn { from{opacity:0; transform: translateY(8px);} to{opacity:1; transform: translateY(0);} }
    .card{ background: var(--card); border: 1px solid rgba(15,23,42,.10); border-radius: var(--radius-xl); box-shadow: var(--shadow); backdrop-filter: var(--blur); padding: 18px; }
    .field{ background: rgba(255,255,255,.74); border: 1px solid rgba(15,23,42,.10); border-radius: 18px; padding: 12px; margin-bottom: 10px; }
    .field label{ display:block; font-size: 11px; color: var(--tg); font-weight: 900; margin-bottom: 4px; text-transform: uppercase; }
    .field input, .field select{ width:100%; border:0; outline:none; background: transparent; font-size: 14px; }
    #orderText { width: 100%; min-height: 220px; background: #fff5f8; padding: 16px; border-radius: 20px; margin-top: 15px; font-family: monospace; font-size: 11px; border: 1px dashed rgba(214,51,132,0.3); line-height: 1.5; outline: none; resize: none; }
    .cta{ width:100%; border:0; border-radius: 18px; padding: 16px; font-weight: 900; color: white; background: linear-gradient(180deg, var(--tg), var(--tg2)); margin-top: 12px; cursor:pointer; }
    .tabs{ position:absolute; left:0; right:0; bottom:0; padding: 10px 12px 30px; background: rgba(244,246,250,.70); backdrop-filter: var(--blur); z-index: 40; }
    .tabBar{ display:flex; gap: 8px; background: rgba(15,23,42,.07); border-radius: 20px; padding: 6px; }
    .tab{ flex:1; border:0; padding: 12px; border-radius: 16px; background: transparent; font-weight: 800; color: var(--muted); cursor:pointer; }
    .tab.active{ background: white; color: var(--text); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .tab-pill-container{ display: flex; background: rgba(15,23,42,.05); padding: 4px; border-radius: 16px; margin-bottom: 18px; }
    .tab-pill{ flex: 1; padding: 10px; border: none; border-radius: 12px; background: transparent; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; }
    .tab-pill.active{ background: white; color: var(--tg); }
  </style>
</head>
<body>
  <div class="phone" id="app">
    <header class="top"><div style="display:flex; align-items:center; gap:10px;"><div class="logo">RT</div><b>Rekberr TeLe</b></div></header>

    <section class="page active" id="page-1">
      <h3 style="margin:10px 0">Dashboard</h3>
      <div class="card" style="background:var(--tg); color:white; margin-bottom:15px;"><h4>Halo, Bosku!</h4><p style="font-size:12px">Sistem siap menghitung otomatis.</p></div>
      <div class="card" onclick="go(2)" style="cursor:pointer">📝 <b>Buat Order Baru</b><p style="font-size:11px; color:var(--muted)">Rekber, Convert & Jaspin</p></div>
    </section>

    <section class="page" id="page-2">
      <div class="tab-pill-container">
        <button class="tab-pill active" onclick="setS('jaspin', this)">Jaspin</button>
        <button class="tab-pill" onclick="setS('convert', this)">Convert</button>
        <button class="tab-pill" onclick="setS('rekber', this)">Rekber</button>
      </div>
      <div class="card">
        <div id="fields"></div>
        <div class="field" id="q-wrap"><label>Metode Transfer Buyer</label>
          <select id="q_glob" onchange="up()">
            <option value="no">Via Nomor (E-Wallet Prem)</option>
            <option value="yes">Via QRIS All Payment (Non-Prem)</option>
            <option value="dana_qris">QRIS Khusus DANA (Normal)</option>
          </select>
        </div>
        <div class="field"><label>Subs @roserekber?</label><select id="s_glob" onchange="up()"><option>Sudah</option><option>Belum</option></select></div>
        <textarea id="orderText" readonly></textarea>
        <button class="cta" onclick="copy()">SALIN & KIRIM</button>
      </div>
    </section>

    <nav class="tabs"><div class="tabBar"><button class="tab active" onclick="go(1)">Home</button><button class="tab" onclick="go(2)">Order</button></div></nav>
  </div>

<script>
    let cur = 'jaspin';
    function go(n){ 
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('page-'+n).classList.add('active');
        if(n===2) setS(cur);
    }

    function setS(s, el){
        cur = s; if(el){document.querySelectorAll('.tab-pill').forEach(b=>b.classList.remove('active')); el.classList.add('active');}
        const f = document.getElementById('fields');
        if(s==='jaspin'){
            document.getElementById('q-wrap').style.display='none';
            f.innerHTML = `<div class="field"><label>Username</label><input id="uj" placeholder="@" oninput="up()"></div><div class="field"><label>Nominal</label><input id="nj" placeholder="0" oninput="fmt(this);up()"></div><div class="field"><label>No + AN</label><input id="nan" placeholder="No Dana/Gopay" oninput="up()"></div>`;
        } else if(s==='convert'){
            document.getElementById('q-wrap').style.display='block';
            f.innerHTML = `<div class="field"><label>Username</label><input id="uc" oninput="up()"></div><div class="field"><label>Nominal Convert</label><input id="nc" oninput="fmt(this);up()"></div><div class="field"><label>Dari E-Wallet</label><input id="dc" value="Dana" oninput="up()"></div><div class="field"><label>Ke E-Wallet</label><input id="tc" oninput="up()"></div><div class="field"><label>Nomor Tujuan</label><input id="ntc" oninput="up()"></div>`;
        } else {
            document.getElementById('q-wrap').style.display='block';
            f.innerHTML = `<div class="field"><label>Username Penjual</label><input id="upen" oninput="up()"></div><div class="field"><label>Username Pembeli</label><input id="upem" oninput="up()"></div><div class="field"><label>Jenis Orderan</label><input id="jrek" oninput="up()"></div><div class="field"><label>Nominal</label><input id="nrek" oninput="fmt(this);up()"></div><div class="field"><label>Penjual Via</label><input id="vpen" value="Dana" oninput="up()"></div><div class="field"><label>Pembeli Via</label><input id="vpem" value="Dana" oninput="up()"></div>`;
        }
        up();
    }

    function rb(n){ return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function fmt(e){ let v=e.value.replace(/\D/g,''); e.value=v?rb(v):''; }

    function fConv(nom, isQ){
        if(!isQ){ // PREMIUM
            if(nom<200000) return 1000; if(nom<300000) return 2000; if(nom<400000) return 3000; if(nom<500000) return 4000;
            return 5000 + (Math.floor((nom-500000)/100000)*1000);
        } else { // NON-PREM
            if(nom<20000) return 2000; if(nom<50000) return 3000; if(nom<100000) return 4000; if(nom<200000) return 6000;
            if(nom<300000) return 8000; if(nom<400000) return 10000; if(nom<500000) return 12000;
            let r=nom>=2000000?0.9:nom>=1500000?0.95:0.97; return Math.ceil(nom-(nom*r));
        }
    }

    function fRek(n){
        if(n < 10000) return "0p";
        if(n < 20000) return "30p";
        if(n < 60000) return "100p";
        if(n < 400000) return "200p";
        if(n < 600000) return "350p";
        if(n < 700000) return "550p";
        if(n < 800000) return "950p";
        if(n < 900000) return "2.000";
        if(n <= 2000000) return "5.000";
        if(n <= 3000000) return "8.000";
        let extra = Math.floor((n - 3000000) / 10000) * 10;
        return rb(8000 + extra);
    }

    function up(){
        const out = document.getElementById('orderText');
        const s = document.getElementById('s_glob').value;
        const qMode = document.getElementById('q_glob').value;

        if(cur==='jaspin'){
            let n = parseInt(document.getElementById('nj').value.replace(/\./g,''))||0;
            let f = (n>0 && n<1000)?"Free":((n<21000)?(Math.floor(n/1000)*10-5):(195+(Math.floor(n/1000)-20)*10));
            if(f!=="Free") f = (f < 1000 ? f+'p' : rb(f));
            out.value = `🪷 𓏸 FORMAT JASPIN ☏\n\nㅤ𐀶. . username :: @${document.getElementById('uj').value}\nㅤ𐀶. . jaspin nominal :: ${rb(n)}\nㅤ𐀶. . fee jaspin :: ${f}\nㅤ𐀶. . nomor + a.n :: ${document.getElementById('nan').value}\nㅤ𐀶. . pakai qris :: yes only dana\nㅤ𐀶. . sudah subs @roserekber ? :: ${s}`;
        } else if(cur==='convert'){
            let n = parseInt(document.getElementById('nc').value.replace(/\./g,''))||0;
            let f = (qMode === 'dana_qris') ? 0 : fConv(n, qMode === 'yes');
            out.value = `🪷 𓏸 FORMAT CONVERT ☏\n\nㅤ𐀶. . username :: @${document.getElementById('uc').value}\nㅤ𐀶. . cv nominal :: ${rb(n)}\nㅤ𐀶. . fee convert :: ${rb(f)}\nㅤ𐀶. . dari ewallet :: ${document.getElementById('dc').value}\nㅤ𐀶. . ewallet tujuan :: ${document.getElementById('tc').value}\nㅤ𐀶. . nomor tujuan :: ${document.getElementById('ntc').value}\nㅤ𐀶. . pakai qris :: ${qMode==='no'?'no':(qMode==='yes'?'yes all payment':'yes dana')}\nㅤ𐀶. . sudah subs @roserekber ? :: ${s}`;
        } else {
            let n = parseInt(document.getElementById('nrek').value.replace(/\./g,''))||0;
            let v1 = document.getElementById('vpen').value.toLowerCase();
            let v2 = document.getElementById('vpem').value.toLowerCase();
            let fr = fRek(n); 
            let fc = 0;
            
            // LOGIKA 2 FEE REKBER
            let isNormal = (v1 === 'dana' && v2 === 'dana' && (qMode === 'no' || qMode === 'dana_qris'));

            if(!isNormal){
                if(qMode === 'yes') {
                    fc = fConv(n, true); // QRIS All Payment (Non-Prem)
                } else {
                    fc = fConv(n, false); // Beda e-wallet atau dana ke luar dana (Premium)
                }
            }

            out.value = `🪷 𓏸 FORMAT REKBER E WALLET ☏\n\nㅤ𐀶. . username penjual :: @${document.getElementById('upen').value}\nㅤ𐀶. . username pembeli :: @${document.getElementById('upem').value}\nㅤ𐀶. . jenis orderan :: ${document.getElementById('jrek').value}\nㅤ𐀶. . nominal :: ${rb(n)}\nㅤ𐀶. . fee rekber :: ${fr}\nㅤ𐀶. . fee convert :: ${fc?rb(fc):0}\nㅤ𐀶. . penjual via :: ${v1}\nㅤ𐀶. . pembeli via :: ${v2}\nㅤ𐀶. . pakai qris :: ${qMode==='no'?'no':(qMode==='yes'?'yes all payment':'yes dana')}\nㅤ𐀶. . sudah subs @roserekber ? :: ${s}`;
        }
    }

    function copy(){
        const t = document.getElementById('orderText');
        if(!t.value || t.value.includes("...")) return alert("Lengkapi form!");
        t.select(); navigator.clipboard.writeText(t.value);
        alert("Pesan Berhasil Disalin!"); 
        window.open("https://t.me/rekberrtelebot", "_blank");
    }
</script>
</body>
</html>
