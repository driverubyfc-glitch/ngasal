<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Rekber - Premium Interface</title>
    <style>
        :root {
            --tg-blue: #24A1DE;
            --tg-blue-dark: #1d86b9;
            --tg-bg: #f0f2f5;
            --tg-text: #222222;
            --tg-gray: #8E8E93;
            --white: #ffffff;
            --bubble: #e7f3ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #f0f0f0;
            display: flex; justify-content: center; color: var(--tg-text);
        }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh;
            background: var(--white); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Animations */
        .page {
            position: absolute; width: 100%; height: 100%;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            background: var(--white); overflow-y: auto; padding-bottom: 30px;
        }
        .hidden-left { transform: translateX(-100%); opacity: 0; }
        .hidden-right { transform: translateX(100%); opacity: 0; }
        .active-page { transform: translateX(0); opacity: 1; }

        /* --- HOME PAGE --- */
        .home-hero {
            background: linear-gradient(135deg, var(--tg-blue), #1c82b1);
            color: white; padding: 50px 20px; text-align: center;
            border-radius: 0 0 30px 30px; margin-bottom: 40px;
        }
        .order-circle {
            width: 140px; height: 140px; background: white;
            border-radius: 50%; margin: -70px auto 30px;
            display: flex; align-items: center; justify-content: center;
            color: var(--tg-blue); font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            transition: 0.3s; border: 4px solid var(--bubble);
        }
        .order-circle:hover { transform: scale(1.05); background: var(--tg-blue); color: white; }

        /* --- ORDER PAGE --- */
        .header {
            padding: 15px 20px; background: var(--white);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 10;
        }
        .nav-tabs {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; padding: 15px 20px;
        }
        .tab-btn {
            border: none; background: var(--tg-bg); padding: 12px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            color: var(--tg-gray); transition: 0.3s; font-size: 0.8rem;
        }
        .tab-btn.active { background: var(--tg-blue); color: white; }

        .form-section { padding: 0 20px; }
        input, select {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #e0e0e0; background: var(--tg-bg);
            margin-top: 10px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--tg-blue); background: white; }

        .output-container {
            background: #242f3d; color: #fff; padding: 20px;
            border-radius: 15px; margin: 20px; font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .btn-copy {
            background: var(--tg-blue); color: white; border: none;
            padding: 16px; border-radius: 12px; width: calc(100% - 40px);
            margin: 0 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
        }

        /* Sidebar Overlay */
        .overlay {
            position: absolute; top: 0; right: -100%; width: 80%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 100; transition: 0.4s;
            padding: 40px 25px; box-shadow: -5px 0 20px rgba(0,0,0,0.1);
        }
        .overlay.open { right: 0; }
        .menu-link {
            display: block; padding: 15px 0; font-size: 1.1rem;
            font-weight: bold; text-decoration: none; color: var(--tg-text);
            border-bottom: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- PAGE 1: HOME -->
    <div id="page-home" class="page active-page">
        <div class="home-hero">
            <h1 style="margin:0">ROSE REKBER</h1>
            <p style="opacity: 0.8; font-size: 0.9rem;">Safe & Fast Transaction</p>
        </div>
        <div class="order-circle" onclick="goTo('page-order')">TAP TO<br>ORDER</div>
        
        <div style="padding: 0 20px;">
            <a href="https://t.me/roserekber" class="menu-link" style="color: var(--tg-blue)">Rate And Kritsar</a>
            <a href="https://t.me/roserekber" class="menu-link" style="color: var(--tg-blue)">Testimonial</a>
            <a href="https://t.me/roserekber" class="menu-link" style="color: var(--tg-blue)">List Admin</a>
        </div>
    </div>

    <!-- PAGE 2: ORDER -->
    <div id="page-order" class="page hidden-right">
        <div class="header">
            <div onclick="goTo('page-home')" style="cursor:pointer; color:var(--tg-blue); font-weight:bold;">← Back</div>
            <span style="font-weight: bold;">@rekberrtele</span>
            <div onclick="toggleSidebar()" style="cursor:pointer; font-size: 20px;">☰</div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('rekber', this)">REKBER</button>
            <button class="tab-btn" onclick="switchTab('jaspin', this)">JASPIN</button>
            <button class="tab-btn" onclick="switchTab('convert', this)">CONVERT</button>
        </div>

        <div class="form-section">
            <div id="dynamic-fields"></div>
            <select id="g_qris" onchange="updateFormat()">
                <option value="no">Pakai QRIS? No</option>
                <option value="yes only dana">Pakai QRIS? Yes Only Dana</option>
            </select>
            <select id="g_subs" onchange="updateFormat()">
                <option value="sudah">Subs @roserekber? Sudah</option>
                <option value="belum">Subs @roserekber? Belum</option>
            </select>
        </div>

        <div class="output-container" id="output"></div>
        <button class="btn-copy" onclick="copyResult()">SALIN FORMAT</button>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="overlay">
        <div onclick="toggleSidebar()" style="font-size: 30px; margin-bottom: 30px; cursor: pointer; color: var(--tg-blue);">×</div>
        <a href="https://t.me/roserekber" class="menu-link">REGULATION</a>
        <a href="https://t.me/roserekber" class="menu-link">CARA KERJA</a>
    </div>
</div>

<script>
    let activeTab = 'rekber';

    // Helper: Format angka dengan titik
    function formatTitik(n) {
        if (!n) return "0";
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // Input Handler: Format otomatis saat mengetik
    function handleInputNominal(el) {
        let val = el.value.replace(/\D/g, '');
        el.dataset.raw = val; // Simpan nilai asli
        el.value = val ? formatTitik(val) : '';
        updateFormat();
    }

    function goTo(pageId) {
        document.querySelectorAll('.page').forEach(p => {
            p.classList.remove('active-page');
            p.classList.add(pageId === 'page-home' ? 'hidden-right' : 'hidden-left');
        });
        document.getElementById(pageId).classList.remove('hidden-left', 'hidden-right');
        document.getElementById(pageId).classList.add('active-page');
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function switchTab(type, btn) {
        activeTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFields();
    }

    function renderFields() {
        const container = document.getElementById('dynamic-fields');
        if(activeTab === 'rekber') {
            container.innerHTML = `
                <input type="text" id="r_sell" placeholder="Username Penjual" oninput="updateFormat()">
                <input type="text" id="r_buy" placeholder="Username Pembeli" oninput="updateFormat()">
                <input type="text" id="r_item" placeholder="Jenis Orderan" oninput="updateFormat()">
                <input type="text" id="r_nom" placeholder="Nominal" oninput="handleInputNominal(this)">
                <input type="text" id="r_vp" placeholder="Penjual Via" oninput="updateFormat()">
                <input type="text" id="r_vb" placeholder="Pembeli Via" oninput="updateFormat()">
            `;
        } else if(activeTab === 'jaspin') {
            container.innerHTML = `
                <input type="text" id="j_user" placeholder="Username" oninput="updateFormat()">
                <input type="text" id="j_nom" placeholder="Nominal" oninput="handleInputNominal(this)">
                <input type="text" id="j_nan" placeholder="Nomor + A.N" oninput="updateFormat()">
            `;
        } else {
            container.innerHTML = `
                <select id="c_tipe" onchange="updateFormat()"><option value="prem">Premium</option><option value="non">Non-Prem</option></select>
                <input type="text" id="c_user" placeholder="Username" oninput="updateFormat()">
                <input type="text" id="c_nom" placeholder="Nominal Convert" oninput="handleInputNominal(this)">
                <input type="text" id="c_dari" placeholder="Dari" oninput="updateFormat()">
                <input type="text" id="c_ke" placeholder="Ke" oninput="updateFormat()">
            `;
        }
        updateFormat();
    }

    function updateFormat() {
        let output = "";
        const qris = document.getElementById('g_qris').value;
        const subs = document.getElementById('g_subs').value;

        if(activeTab === 'rekber') {
            let nom = parseInt(document.getElementById('r_nom')?.dataset.raw) || 0;
            let vp = (document.getElementById('r_vp')?.value || "").toLowerCase().trim();
            let vb = (document.getElementById('r_vb')?.value || "").toLowerCase().trim();
            
            // Logika Fee Rekber (Sesuai User Summary)
            let feeRek = 0; let isP = true;
            if(nom < 10000) feeRek = 0;
            else if(nom < 20000) feeRek = 30;
            else if(nom < 60000) feeRek = 100;
            else if(nom < 400000) feeRek = 200;
            else if(nom < 1000000) { feeRek = 2000; isP = false; }
            else { feeRek = 5000; isP = false; }

            // Logika Convert
            let feeCv = 0; let info = "";
            if(vp !== "" && vb !== "" && vp !== vb) {
                if(qris.includes("yes")) {
                    feeCv = (nom < 100000) ? 4000 : 8000; // Contoh tarif non-prem
                    info = " (inc cv non-prem)";
                } else {
                    feeCv = (Math.floor(nom/100000)+1)*1000; // Contoh tarif prem
                    info = " (inc cv prem)";
                }
            }
            let total = feeRek + feeCv;
            let fFinal = (total < 1000 && isP && feeCv === 0) ? total + "p" : formatTitik(total);

            output = `🪷 𓏸  FORMAT REKBER E WALLET ☏\n\nㅤ𐀶. . username penjual :: @${document.getElementById('r_sell')?.value || "..."}\nㅤ𐀶. . username pembeli :: @${document.getElementById('r_buy')?.value || "..."}\nㅤ𐀶. . jenis orderan :: ${document.getElementById('r_item')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . fee rekber :: ${fFinal}${info}\nㅤ𐀶. . penjual via :: ${vp}\nㅤ𐀶. . pembeli via :: ${vb}\nㅤ𐀶. . pakai qris :: ${qris}\nㅤ𐀶. . sudah subs @roserekber ? :: ${subs}`;
        } else if(activeTab === 'jaspin') {
            let nom = parseInt(document.getElementById('j_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT JASPIN ☏\n\nㅤ𐀶. . username :: @${document.getElementById('j_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . fee :: 1.000\nㅤ𐀶. . nomor :: ${document.getElementById('j_nan')?.value || "..."}`;
        } else {
            let nom = parseInt(document.getElementById('c_nom')?.dataset.raw) || 0;
            output = `🪷 𓏸  FORMAT CONVERT ☏\n\nㅤ𐀶. . username :: @${document.getElementById('c_user')?.value || "..."}\nㅤ𐀶. . nominal :: ${formatTitik(nom)}\nㅤ𐀶. . via :: ${document.getElementById('c_dari')?.value || "..."} ke ${document.getElementById('c_ke')?.value || "..."}`;
        }
        document.getElementById('output').innerText = output;
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        alert("Format Berhasil Disalin!");
    }

    renderFields();
</script>
</body>
</html>
